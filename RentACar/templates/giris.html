<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | EDİ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --edi-yellow: #FFEE00; /* Neon Sarı */
            --edi-bg: #222222;     /* Arka Plan */
            --edi-card: #000000;   /* Kart Rengi */
        }
        body {
            background-color: var(--edi-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: var(--edi-card);
            border: 1px solid #333;
            border-top: 5px solid var(--edi-yellow); /* Üstte Sarı Çizgi */
            border-bottom: 5px solid var(--edi-yellow); /* Altta Sarı Çizgi */
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        .form-control {
            background-color: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 0; 
            padding: 12px;
        }
        .form-control:focus {
            background-color: #444;
            border-color: var(--edi-yellow);
            color: white;
            box-shadow: none;
        }
        
        .btn-edi {
            background-color: var(--edi-yellow);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 0;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-edi:hover {
            background-color: white;
            box-shadow: 0 0 15px var(--edi-yellow);
        }
        
        .alt-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .alt-link a {
            color: var(--edi-yellow);
            text-decoration: none;
            font-weight: bold;
        }
        .alt-link a:hover {
            color: white;
        }

        /* HATA MESAJI KUTUSU TASARIMI */
        .hata-kutusu {
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hata-kutusu i {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="text-center mb-4">
            <i class="fa-solid fa-car-side mb-2" style="font-size: 3rem; color: var(--edi-yellow); text-shadow: 0 0 10px rgba(255, 238, 0, 0.3);"></i>
            <div style="color: white; font-weight: 900; font-size: 2rem; letter-spacing: 1px; line-height: 1.2;">
                EDİ <span style="font-weight: 300; color: #ccc;">RENT A CAR</span>
            </div>
            <div style="width: 60px; height: 4px; background-color: var(--edi-yellow); margin: 15px auto;"></div>
            <div style="color: var(--edi-yellow); font-size: 0.9rem; font-weight: bold; letter-spacing: 3px;">
                KULLANICI GİRİŞİ
            </div>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="hata-kutusu">
                  <i class="fa-solid fa-circle-exclamation"></i>
                  <span>{{ message }}</span>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">E-POSTA ADRESİ</label>
                <input type="email" name="email" class="form-control" placeholder="ornek@email.com" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">ŞİFRE</label>
                <input type="password" name="sifre" class="form-control" placeholder="******" required>
            </div>

            <button type="submit" class="btn btn-edi">GİRİŞ YAP <i class="fa-solid fa-chevron-right ms-2"></i></button>
        </form>
        
        <div class="alt-link">
            <p class="text-secondary mb-1">Henüz bir hesabın yok mu?</p>
            <a href="/kayit">HEMEN KAYIT OL</a>
            <div class="mt-3">
                <a href="/" style="color: #666; font-size: 0.8rem; text-decoration: none;">
                    <i class="fa-solid fa-arrow-left"></i> ANA SAYFAYA DÖN
                </a>
            </div>
        </div>
    </div>

</body>
</html>
