<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlem Başarılı | EDİ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --edi-yellow: #FFEE00;
            --edi-bg: #222222;
            --edi-card: #000000;
        }
        body {
            background-color: var(--edi-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .success-card {
            background-color: var(--edi-card);
            border: 1px solid #333;
            border-top: 5px solid #2ecc71; /* Başarı Yeşili */
            border-bottom: 5px solid #2ecc71;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .icon-box {
            font-size: 5rem;
            color: #2ecc71;
            margin-bottom: 20px;
            animation: jump 0.6s ease;
        }
        
        h1 {
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: white;
            letter-spacing: 1px;
        }
        
        p {
            color: #ccc;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            background-color: var(--edi-yellow);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            padding: 15px 30px;
            border: none;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background-color: white;
            color: black;
            box-shadow: 0 0 15px var(--edi-yellow);
            transform: scale(1.05);
        }

        @keyframes jump {
            0% { transform: scale(0); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        
        <h1>ÖDEMENİZ ALINMIŞTIR</h1>
        
        <p>
            Teşekkür ederiz! Rezervasyon işleminiz başarıyla tamamlandı.<br>
            <span style="color: var(--edi-yellow); font-weight: bold;">
                Aracı teslim alacağınız lokasyon ve saat bilgileri sizlere 
                e-posta olarak iletilecektir.
            </span>
        </p>
        
        <a href="/" class="btn-home">
            <i class="fa-solid fa-house me-2"></i> ANA SAYFAYA DÖN
        </a>
    </div>

</body>
</html>
