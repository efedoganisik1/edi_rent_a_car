<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Ödeme | EDİ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --edi-yellow: #FFEE00;
            --edi-bg: #222222;
            --edi-card: #000000;
        }
        body {
            background-color: var(--edi-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 50px;
        }
        
        .navbar {
            background-color: black !important;
            border-bottom: 2px solid var(--edi-yellow);
            padding: 15px 0;
            margin-bottom: 40px;
        }
        .navbar-brand {
            color: var(--edi-yellow) !important;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .payment-card {
            background-color: var(--edi-card);
            border: 1px solid #333;
            border-top: 5px solid var(--edi-yellow);
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            height: 100%;
        }
        .card-header-title {
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 1.2rem;
        }
        .card-header-title span { color: var(--edi-yellow); }

        .form-label { color: #aaa; font-size: 0.85rem; font-weight: bold; }
        .form-control {
            background-color: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 0;
            padding: 12px;
            font-weight: bold;
        }
        .form-control:focus {
            background-color: #444;
            border-color: var(--edi-yellow);
            color: white;
            box-shadow: none;
        }
        .form-control::placeholder { color: #555; font-weight: normal; }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }
        .summary-label { color: #888; font-size: 0.9rem; }
        .summary-value { font-weight: bold; }
        .total-price {
            font-size: 2rem;
            color: var(--edi-yellow);
            font-weight: 900;
            text-align: center;
            margin-top: 20px;
        }

        .btn-pay {
            background-color: var(--edi-yellow);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 0;
            padding: 15px;
            width: 100%;
            border: none;
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        .btn-pay:hover {
            background-color: white;
            box-shadow: 0 0 20px var(--edi-yellow);
        }
        
        .credit-card-icon {
            font-size: 2rem;
            color: #555;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">EDİ <span style="color:white; font-size:0.6em">ÖDEME EKRANI</span></a>
        </div>
    </nav>

    <div class="container">
        <form action="/kiralama-tamamla" method="POST">
            <input type="hidden" name="araba_id" value="{{ bilgiler['araba_id'] }}">
            <input type="hidden" name="alis_tarihi" value="{{ bilgiler['alis_tarihi'] }}">
            <input type="hidden" name="donus_tarihi" value="{{ bilgiler['donus_tarihi'] }}">
            <input type="hidden" name="toplam_tutar" value="{{ bilgiler['toplam_tutar'] }}">

            <div class="row">
                <div class="col-lg-8 mb-4">
                    <div class="payment-card">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
                            <h2 class="card-header-title mb-0" style="border:none; padding:0;">KART <span>BİLGİLERİ</span></h2>
                            <div>
                                <i class="fa-brands fa-cc-visa credit-card-icon"></i>
                                <i class="fa-brands fa-cc-mastercard credit-card-icon"></i>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">KART ÜZERİNDEKİ İSİM</label>
                            <input type="text" class="form-control" placeholder="AD SOYAD" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">KART NUMARASI (16 Hane)</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="kartNo"
                                   placeholder="0000 0000 0000 0000" 
                                   maxlength="16" 
                                   oninput="sadeceRakam(this)"
                                   required>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-4">
                                <label class="form-label">SON KULLANMA (AA/YY)</label>
                                <div class="d-flex gap-2">
                                    <input type="text" 
                                           class="form-control text-center" 
                                           placeholder="AA" 
                                           maxlength="2" 
                                           oninput="ayKontrol(this)" 
                                           required>
                                           
                                    <input type="text" 
                                           class="form-control text-center" 
                                           placeholder="YY" 
                                           maxlength="2" 
                                           oninput="sadeceRakam(this)" 
                                           required>
                                </div>
                            </div>
                            <div class="col-6 mb-4">
                                <label class="form-label">CVC / CVV</label>
                                <input type="text" 
                                       class="form-control text-center" 
                                       placeholder="000" 
                                       maxlength="3" 
                                       oninput="sadeceRakam(this)" 
                                       required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="payment-card">
                        <h2 class="card-header-title">SİPARİŞ <span>ÖZETİ</span></h2>
                        
                        <div class="text-center mb-4">
                            <img src="{{ araba['gorsel'] }}" class="img-fluid rounded border border-secondary" style="max-height: 150px;">
                            <h4 class="mt-3 fw-bold">{{ araba['marka'] }} {{ araba['model'] }}</h4>
                        </div>

                        <div class="summary-row">
                            <span class="summary-label">Alış Tarihi</span>
                            <span class="summary-value">{{ bilgiler['alis_tarihi'] }}</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Dönüş Tarihi</span>
                            <span class="summary-value">{{ bilgiler['donus_tarihi'] }}</span>
                        </div>
                        
                        <div class="text-center mt-4">
                            <span class="d-block text-secondary small">ÖDENECEK TUTAR</span>
                            <div class="total-price">{{ bilgiler['toplam_tutar'] }} TL</div>
                        </div>

                        <button type="submit" class="btn btn-pay mt-4">
                            ÖDEMEYİ ONAYLA <i class="fa-solid fa-lock ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Sadece rakam girilmesini sağlar (Harfleri siler)
        function sadeceRakam(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
        }

        // Ay bilgisini kontrol eder (12'den büyükse uyarı verir)
        function ayKontrol(input) {
            // Önce sadece rakam olduğundan emin ol
            input.value = input.value.replace(/[^0-9]/g, '');
            
            // Değeri sayıya çevir
            var ay = parseInt(input.value);

            // Eğer 12'den büyükse
            if (ay > 12) {
                alert("Geçersiz bilgi! Ay bölümü 12'den büyük olamaz.");
                input.value = ""; // Kutuyu temizle
            }
        }
    </script>

</body>
</html>
